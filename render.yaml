services:
  - type: web
    name: forgeflow-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FORGEFLOW_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: forgeflow-db
          property: connectionString

databases:
  - name: forgeflow-db
    databaseName: forgeflow
    user: forgeflow
